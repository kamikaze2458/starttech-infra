name: Infrastructure Deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/infrastructure-deploy.yml"
  pull_request:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "eu-central-1"
  AWS_DEFAULT_REGION: "eu-central-1"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Terraform init
        working-directory: terraform
        run: terraform init
        env:
          AWS_DEFAULT_REGION: eu-central-1

      - name: Terraform plan
        working-directory: terraform
        env:
          AWS_DEFAULT_REGION: eu-central-1
          TF_VAR_environment: prod
          TF_VAR_frontend_bucket_name: ${{ secrets.FRONTEND_BUCKET_NAME }}
          TF_VAR_ami_id: ${{ secrets.EC2_AMI_ID }}
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
          TF_VAR_mongo_uri_secret_id: ${{ secrets.MONGO_URI_SECRET_ID }}
          TF_VAR_alarm_email: ${{ secrets.ALARM_EMAIL }}
        run: |
          terraform plan \
            -var="aws_region=eu-central-1" \
            -detailed-exitcode 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi
          echo "Plan complete (exit code: $EXIT_CODE)"
